services:
  postgres:
    image: postgres:16-alpine
    container_name: mahakosh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mahakosh}
      POSTGRES_USER: ${POSTGRES_USER:-mahakosh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mahakosh_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mahakosh} -d ${POSTGRES_DB:-mahakosh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mahakosh-network

  redis:
    image: redis:7-alpine
    container_name: mahakosh-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mahakosh-network

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: mahakosh-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q ok'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - mahakosh-network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: mahakosh-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-mahakosh_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-mahakosh_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - mahakosh-network

  minio-init:
    image: minio/mc:RELEASE.2024-12-18T13-15-44Z
    container_name: mahakosh-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set mahakosh http://minio:9000 ${MINIO_ACCESS_KEY:-mahakosh_minio} ${MINIO_SECRET_KEY:-mahakosh_minio_secret};
      mc mb --ignore-existing mahakosh/${MINIO_BUCKET:-mahakosh-documents};
      mc anonymous set download mahakosh/${MINIO_BUCKET:-mahakosh-documents};
      exit 0;
      "
    networks:
      - mahakosh-network

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: mahakosh-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mahakosh}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-mahakosh_secret}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./infrastructure/docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - mahakosh-network

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: mahakosh-temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - mahakosh-network

  ollama:
    image: ollama/ollama:0.5.4
    container_name: mahakosh-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mahakosh-network

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile
    container_name: mahakosh-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mahakosh}:${POSTGRES_PASSWORD:-mahakosh_secret}@postgres:5432/${POSTGRES_DB:-mahakosh}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-mahakosh}:${POSTGRES_PASSWORD:-mahakosh_secret}@postgres:5432/${POSTGRES_DB:-mahakosh}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      TEMPORAL_HOST: temporal
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./storage:/app/storage
    working_dir: /app
    command: >
      sh -c "alembic -c backend/alembic.ini upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mahakosh-network

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
      target: development
    container_name: mahakosh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.next
    networks:
      - mahakosh-network

  nginx:
    image: nginx:1.27-alpine
    container_name: mahakosh-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - mahakosh-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  ollama_data:

networks:
  mahakosh-network:
    driver: bridge
